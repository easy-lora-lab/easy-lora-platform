services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:////app/data/easytune.db
      EASYTUNE_STORAGE_ROOT: /app/app/storage
    volumes:
      - ./backend/app/storage:/app/app/storage
      - ./backend/data:/app/data

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend
